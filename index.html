<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo DNY - Generador de Cartones</title>
    <link rel="stylesheet" href="style.css">
    <!-- Librería para random con semilla (via CDN) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/seedrandom/3.0.5/seedrandom.min.js"></script>
</head>
<body>
    <header>
        <h1>Bingo DNY - ¡Tu suerte comienza aquí! 🎉</h1>
    </header>
    <main>
        <section>
            <label for="numero">Ingresa un número para generar tu cartón:</label>
            <input type="number" id="numero" min="1" placeholder="Ej: 123">
            <button id="generar">Generar Cartón</button>
        </section>
        <div id="carton-container"></div>
    </main>
    <script src="script.js"></script>
</body>
</html>
